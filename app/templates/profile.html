<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій профіль • HACKATHONS</title>

    <link rel="stylesheet" href="../static/css/home.css">
    <link rel="stylesheet" href="../static/css/profile.css">

    <script src="../static/js/themeToggle.js" defer></script>
    <script src="../static/js/profile.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body data-role="test">
<header class="header">
    <button id="themeToggle" class="theme-toggle">&#9789;</button>
    <div class="logo">#HACKATHONS</div>
</header>

   <aside class="sidebar">
    <nav class="sidebar-nav">
    <a href="../templates/home.html" class="nav-item" title="Головна">
        <img src="../static/icons/home.svg" width="28" height="28">
    </a>

    <a href="../templates/tournaments.html" class="nav-item" title="Турніри">
        <img src="../static/icons/tournaments.svg" width="24" height="24">
    </a>

    <a href="../templates/leaderboard.html" class="nav-item" title="Лідерборд">
        <img src="../static/icons/leaderboard.svg" width="30" height="30">
    </a>

    <a href="../templates/profile.html" class="nav-item active" title="Профіль">
        <img src="../static/icons/profile.svg" width="24" height="24">
    </a>

    <a href="../templates/settings.html" class="nav-item" title="Налаштування">
        <img src="../static/icons/settings.svg" width="40" height="40">
    </a>
    </nav>
</aside>

<main class="main profile-main">


    <section class="section-header profile-header">
        <div class="section-title">
            <h2>Мій профіль</h2>
        </div>
    </section>

    <section class="profile-grid">

        <!--USER INFO-->
        <article class="profile-card">
            <h3>Особисті дані</h3>

            <div class="profile-user">
                <div class="profile-avatar">
                    <p>ДК</p>
                </div>

                <div class="profile-user-info">
                    <h4>Данiл Колбасенко</h4>
                    <p>DanilKolbasenko@gmail.com</p>
                </div>
            </div>

            <div class="profile-meta">
                <div>
                    <span>Роль: <span id="roleDisplay"></span></span>
                </div>
                <div>
                    <span>Зареєстровано: 01.01.2026</span>
                </div>
            </div>
        </article>

        <!--PASSWORD CHANGE-->
        <article class="profile-card">
            <h3>Зміна паролю</h3>

            <form method="POST" class="password-form">

                <label class="form-field">
                    <span>Старий пароль</span>
                    <input type="password" name="old_password" required>
                </label>

                <label class="form-field">
                    <span>Новий пароль</span>
                    <input type="password" name="new_password" required>
                </label>

                <label class="form-field">
                    <span>Підтвердити пароль</span>
                    <input type="password" name="confirm_password" required>
                </label>

                <button type="submit">Змінити пароль</button>

            </form>
        </article>
    </section>

</main>

<footer class="profile-footer">
    <p>© 2026 #HACKATHONS</p>
    <a href="../templates/privacy.html">Політика конфіденційності</a>
</footer>

</body>
</html>
