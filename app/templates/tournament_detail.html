{% block content %}
{% extends "base.html" %}
<div class="tournament-detail">
    <h1>{{ tournament.name }}</h1>
    <p>{{ tournament.description }}</p>
    
    <div class="detail-stats">
        <div class="stat-card">
            <span class="stat-label">Реєстрація</span>
            <span class="stat-value">{{ tournament.registration_start.strftime('%d.%m.%Y') }} — {{ tournament.registration_end.strftime('%d.%m.%Y') }}</span>
        </div>
    </div>

    <a href="{{ url_for('tournaments.leaderboard', tournament_id=tournament.id) }}" class="tournament-btn">
        Переглянути лідерборд
    </a>
</div>
{% endblock %}
