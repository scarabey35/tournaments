<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Створення турніру • HACKATHONS</title>
    <script src="{{ url_for('static', filename='js/themeToggle.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tournaments.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme" data-role="admin">
    <header class="header">
        <button id="themeToggle" class="theme-toggle" aria-label="Перемкнути тему">&#9789;</button>
        <div class="logo">#HACKATHONS</div>
        <div class="role">Роль: <span>Адміністратор</span></div>
    </header>

    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('landing.home') }}" class="nav-item" title="Головна">
                <img src="{{ url_for('static', filename='icons/home.svg') }}" alt="Головна" width="28" height="28">
            </a>

            <a href="{{ url_for('tournaments.tournaments_list') }}" class="nav-item" title="Турніри">
                <img src="{{ url_for('static', filename='icons/tournaments.svg') }}" alt="Турніри" width="24" height="24">
            </a>

            <a href="{{ url_for('tournaments.leaderboard_global') }}" class="nav-item" title="Лідерборд">
                <img src="{{ url_for('static', filename='icons/leaderboard.svg') }}" alt="Лідерборд" width="30" height="30">
            </a>

            <a href="{{ url_for('user.profile') }}" class="nav-item" title="Профіль">
                <img src="{{ url_for('static', filename='icons/profile.svg') }}" alt="Профіль" width="24" height="24">
            </a>

            <a href="{{ url_for('user.settings') }}" class="nav-item" title="Налаштування">
                <img src="{{ url_for('static', filename='icons/settings.svg') }}" alt="Налаштування" width="40" height="40">
            </a>

            <a href="{{ url_for('landing.admin_dashboard') }}" class="nav-item admin-nav-item active" title="Адмін-панель">
                <img src="{{ url_for('static', filename='icons/admin.svg') }}" alt="Адмін-панель" width="28" height="28">
            </a>
        </nav>
    </aside>

    <main class="main admin-main">
        <section class="tournaments-section admin-hero">
            <div class="section-header">
                <div class="section-title">
                    <span class="status-dot status-upcoming"></span>
                    <h2>Створення турніру</h2>
                </div>
                <a class="tournament-btn create-btn" href="{{ url_for('admin.dashboard') }}">Повернутися до панелі</a>
            </div>
            <p class="section-note">Усі поля обов'язкові, окрім максимальної кількості команд. Дані нікуди не відправляються.</p>
        </section>

        <section class="tournaments-section">
            <form class="filters admin-form admin-create-form" id="admin-create-tournament-form">
                <div class="filter-group">
                    <label for="title">Назва турніру</label>
                    <input id="title" name="title" type="text" required>
                </div>

                <div class="filter-group admin-form-full">
                    <label for="description">Опис</label>
                    <textarea id="description" name="description" required></textarea>
                </div>

                <div class="filter-group">
                    <label for="start_date">Дата старту</label>
                    <input id="start_date" name="start_date" type="date" required>
                </div>

                <div class="filter-group">
                    <label for="registration_deadline">Дата завершення реєстрації</label>
                    <input id="registration_deadline" name="registration_deadline" type="date" required>
                </div>

                <div class="filter-group">
                    <label for="submission_deadline">Дедлайн здачі робіт</label>
                    <input id="submission_deadline" name="submission_deadline" type="datetime-local" required>
                </div>

                <div class="filter-group">
                    <label for="max_teams">Максимальна кількість команд</label>
                    <input id="max_teams" name="max_teams" type="number" min="1" placeholder="Необов'язково">
                </div>

                <div class="filter-group">
                    <label for="format">Формат</label>
                    <select id="format" name="format" required>
                        <option value="" selected disabled>Оберіть формат</option>
                        <option value="online">Онлайн</option>
                        <option value="offline">Офлайн</option>
                        <option value="hybrid">Гібрид</option>
                    </select>
                </div>

                <button type="submit" class="filter-btn">Створити турнір</button>
            </form>
        </section>
    </main>
</body>
</html>
