<!doctype html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>

    <link rel="stylesheet" href="../static/css/register.css">
    <script src="../static/js/register.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="logo">#HACKATHONS</div>
    </header>

    <main class="register-main">
        <div class="container">
            <h1>Реєстрація користувача</h1>
            <div class="subtitle">Створіть акаунт для участі у турнірі</div>

            <form method="POST">

                <!-- 👤 ІМʼЯ -->
                <div class="section">
                    <div class="section-title">Ім'я</div>
                    <input
                        type="text"
                        name="name"
                        placeholder="Введіть ім'я"
                        required
                    >
                </div>

                <!-- 📧 EMAIL -->
                <div class="section">
                    <div class="section-title">Email</div>
                    <input
                        type="email"
                        name="email"
                        placeholder="Введіть email"
                        required
                    >
                </div>

                <!-- 🔐 PASSWORD -->
                <div class="section">
                    <div class="section-title">Пароль</div>
                    <input
                        type="password"
                        name="password"
                        placeholder="Придумайте пароль"
                        required
                    >
                </div>

                <!-- 🎭 ROLE -->
                <div class="section">
                    <div class="section-title">Роль</div>
                    <select name="role" class="select" required>
                        <option value="team">Учасник</option>
                        <option value="jury">Журі</option>
                        <option value="admin">Адміністратор</option>
                    </select>
                </div>

                <button type="submit" class="button">
                    Зареєструватися
                </button>

                <!-- 🔗 LOGIN -->
                <div class="footer">
                    Вже є акаунт?
                    <a href="../templates/login.html">Увійти</a>
                </div>

            </form>

            <div class="footer">
                Турнір з програмування © 2026
            </div>
        </div>
    </main>
</body>
</html>
